<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>JobPilot</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <h1>JobPilot</h1>
      <span class="status" id="status-indicator">●</span>
    </div>

    <div class="section" id="login-section">
      <input type="text" id="api-host" placeholder="API 地址 (默认 localhost:8004)" value="http://localhost:8004">
      <input type="password" id="token-input" placeholder="JWT Token">
      <button id="login-btn" class="btn btn-primary">连接</button>
    </div>

    <div class="section" id="main-section" style="display:none">
      <div class="info-row">
        <span>当前页面</span>
        <span id="current-url" class="url-text">-</span>
      </div>

      <button id="fill-btn" class="btn btn-primary">一键填表</button>

      <div class="toggle-row">
        <span>自动提交</span>
        <label class="switch">
          <input type="checkbox" id="auto-submit-toggle">
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-row">
        <span>同步聊天</span>
        <label class="switch">
          <input type="checkbox" id="sync-chat-toggle" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="section-title">最近申请</div>
      <div id="recent-apps">加载中...</div>
    </div>

    <div id="message-box" class="message"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
