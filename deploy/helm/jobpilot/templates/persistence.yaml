{{- range $name, $cfg := dict "postgres" .Values.postgres "redis" .Values.redis "elasticsearch" .Values.elasticsearch "milvus" .Values.milvus "neo4j" .Values.neo4j "minio" .Values.minio }}
{{- if and $cfg.enabled $cfg.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $.Release.Name }}-{{ $name }}-data
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/part-of: jobpilot
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ $cfg.persistence.size }}
  {{- if or $cfg.persistence.storageClass $.Values.global.storageClass }}
  storageClassName: {{ $cfg.persistence.storageClass | default $.Values.global.storageClass }}
  {{- end }}
{{- end }}
{{- end }}
