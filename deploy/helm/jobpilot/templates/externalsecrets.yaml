{{- if .Values.externalSecrets.enabled }}
{{- $provider := .Values.externalSecrets.provider }}
---
# ClusterSecretStore — 指向 AWS Secrets Manager 或 HashiCorp Vault
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ .Release.Name }}-secretstore
spec:
  provider:
  {{- if eq $provider "aws" }}
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecrets.awsRegion | default "us-east-1" }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ .Release.Name }}-external-secrets
  {{- else if eq $provider "vault" }}
    vault:
      server: {{ .Values.externalSecrets.vaultAddr | quote }}
      path: jobpilot
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: jobpilot-reader
  {{- end }}
---
# ExternalSecret — 同步 JWT secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-jwt-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Release.Name }}-secretstore
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-jwt
    creationPolicy: Owner
  data:
  - secretKey: JWT_SECRET_KEY
    remoteRef:
      key: /jobpilot/{{ .Values.global.environment }}/jwt
      property: secret_key
---
# ExternalSecret — 同步 API keys (LiveKit, Anthropic, Deepgram)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-api-keys
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Release.Name }}-secretstore
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-api-keys
    creationPolicy: Owner
  data:
  - secretKey: LIVEKIT_API_KEY
    remoteRef:
      key: /jobpilot/{{ .Values.global.environment }}/livekit
      property: api_key
  - secretKey: LIVEKIT_API_SECRET
    remoteRef:
      key: /jobpilot/{{ .Values.global.environment }}/livekit
      property: api_secret
  - secretKey: ANTHROPIC_API_KEY
    remoteRef:
      key: /jobpilot/{{ .Values.global.environment }}/anthropic
      property: api_key
  - secretKey: DEEPGRAM_API_KEY
    remoteRef:
      key: /jobpilot/{{ .Values.global.environment }}/deepgram
      property: api_key
---
# ServiceAccount for External Secrets
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-external-secrets
  annotations:
    {{- if eq $provider "aws" }}
    eks.amazonaws.com/role-arn: arn:aws:iam::{{ .Values.externalSecrets.awsAccountId }}:role/external-secrets-reader
    {{- end }}
{{- end }}
