events { worker_connections 1024; }

http {
    server {
        listen 80;

        location /api/ {
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            if ($request_method = OPTIONS) { return 204; }

            location /api/users/register { proxy_pass http://user_service:8000/auth/register; }
            location /api/users/login    { proxy_pass http://user_service:8000/auth/login; }
            location /api/users/    { proxy_pass http://user_service:8000/; }
            location /api/resumes/upload { proxy_pass http://resume_service:8000/parse; }
            location /api/resumes/ { proxy_pass http://resume_service:8000/; }
            location /api/matches/ { proxy_pass http://match_service:8000/; }
            location /api/applications/ { proxy_pass http://apply_service:8000/; }
            location /api/interviews/ { proxy_pass http://interview_service:8000/; }
            location /api/agent/ { proxy_pass http://agent_service:8000/; }
        }
        location / { return 200 'OK'; }
    }
}
