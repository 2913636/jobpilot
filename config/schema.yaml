# JobPilot 配置结构定义
# 所有环境配置文件必须符合此 schema

logging:
  level: DEBUG          # DEBUG | INFO | WARNING | ERROR
  json_format: true     # true = JSON, false = 纯文本

cache:
  default_ttl: 300      # 秒
  null_ttl: 30          # 空值穿透保护 TTL
  skill_graph_ttl: 86400  # 技能图谱 (24h)
  hot_jobs_ttl: 300     # 热门岗位 (5min)
  user_profile_ttl: 3600  # 用户档案 (1h)

database:
  pool_size: 10
  max_overflow: 20
  echo_sql: false       # SQL 日志

rate_limit:
  window: 60            # 秒
  max_requests: 100     # 每窗口最大请求数

tracing:
  enabled: true
  sampling_rate: 1.0    # 0.0 - 1.0

services:
  llm_timeout: 30       # LLM 调用超时(秒)
  ocr_timeout: 60       # OCR 超时(秒)
  crawl_timeout: 300    # 爬虫超时(秒)
