# Staging Environment Configuration
extends: schema.yaml

logging:
  level: INFO
  json_format: true

cache:
  default_ttl: 300
  null_ttl: 30
  skill_graph_ttl: 86400
  hot_jobs_ttl: 300
  user_profile_ttl: 3600

database:
  pool_size: 10
  max_overflow: 20
  echo_sql: false

rate_limit:
  window: 60
  max_requests: 200

tracing:
  enabled: true
  sampling_rate: 0.5

services:
  llm_timeout: 30
  ocr_timeout: 60
  crawl_timeout: 300
