# Pre-commit hooks — install with: pre-commit install
repos:
  - repo: https://github.com/psf/black
    rev: 24.4.0
    hooks:
      - id: black
        args: [--line-length=100]
        files: ^backend/.*\.py$

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black]
        files: ^backend/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^frontend/src/.*\.(ts|tsx|css)$

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [-ll, -r, backend/]
        pass_filenames: false

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest --exitfirst
        entry: pytest --exitfirst --tb=short
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
        always_run: false
