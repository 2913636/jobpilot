name: CD - Canary Deploy

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/jobpilot

jobs:
  # ── Build All Images ────────────────────────────────────────────
  build-all:
    name: Build Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, resume-service, match-service, apply-service, interview-service, agent-service, frontend]
      fail-fast: false
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: type=semver,pattern={{version}}
      - uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: SERVICE_NAME=${{ matrix.service }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Canary Deploy ───────────────────────────────────────────────
  canary-deploy:
    name: Canary Deploy (${{ github.event.inputs.environment || 'staging' }})
    runs-on: ubuntu-latest
    needs: build-all
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
    env:
      ENV: ${{ github.event.inputs.environment || 'staging' }}
      IMAGE_TAG: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name jobpilot-${{ env.ENV }} --region ${{ secrets.AWS_REGION }}

      # ── Phase 1: Canary 10% ──────────────────────────────────
      - name: Phase 1 - Deploy Canary (10%)
        run: |
          helm upgrade --install jobpilot ./deploy/helm/jobpilot \
            --namespace jobpilot --create-namespace \
            --values ./deploy/helm/jobpilot/values.yaml \
            --values ./deploy/helm/jobpilot/${{ env.ENV }}.yaml \
            --set global.imageTag=${{ env.IMAGE_TAG }} \
            --set canary.enabled=true \
            --set canary.weight=10 \
            --timeout 5m --wait --atomic

      - name: Phase 1 - Wait & Monitor (5 min)
        run: |
          echo "Canary deployed at 10%. Monitoring for 5 minutes..."
          for i in $(seq 1 30); do
            sleep 10
            FAILED=$(kubectl get pods -n jobpilot -l app.kubernetes.io/part-of=jobpilot \
              --field-selector=status.phase!=Running -o name 2>/dev/null | wc -l)
            echo "[${i}/30] Non-running pods: $FAILED"
          done

      - name: Phase 1 - Health Check & Error Rate
        id: canary-check
        run: |
          ERROR_RATE=0
          for svc in user-service resume-service match-service apply-service interview-service agent-service; do
            STATUS=$(kubectl exec -n jobpilot deploy/${svc}-canary \
              -- curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health 2>/dev/null || echo "000")
            echo "$svc canary health: HTTP $STATUS"
            if [ "$STATUS" != "200" ]; then ERROR_RATE=$((ERROR_RATE + 1)); fi
          done

          if [ $ERROR_RATE -gt 1 ]; then
            echo "ERROR_RATE=$ERROR_RATE exceeds threshold. Rolling back."
            echo "canary_failed=true" >> $GITHUB_OUTPUT
          else
            echo "Canary healthy. Proceeding to full rollout."
            echo "canary_failed=false" >> $GITHUB_OUTPUT
          fi

      # ── Rollback on Failure ──────────────────────────────────
      - name: Phase 1 - Rollback Canary
        if: steps.canary-check.outputs.canary_failed == 'true'
        run: |
          echo "Rolling back canary deployment..."
          helm rollback jobpilot --namespace jobpilot
          kubectl delete pods -n jobpilot -l canary=true 2>/dev/null || true
          echo "Rollback complete. Alerting..."
          exit 1

      # ── Phase 2: Full Rollout ────────────────────────────────
      - name: Phase 2 - Full Rollout (100%)
        if: steps.canary-check.outputs.canary_failed == 'false'
        run: |
          helm upgrade --install jobpilot ./deploy/helm/jobpilot \
            --namespace jobpilot --create-namespace \
            --values ./deploy/helm/jobpilot/values.yaml \
            --values ./deploy/helm/jobpilot/${{ env.ENV }}.yaml \
            --set global.imageTag=${{ env.IMAGE_TAG }} \
            --set canary.enabled=false \
            --timeout 10m --wait --atomic

          kubectl rollout status deployment -n jobpilot --timeout=5m

      # ── Smoke Tests ──────────────────────────────────────────
      - name: Smoke Tests
        if: steps.canary-check.outputs.canary_failed == 'false'
        run: |
          echo "Running post-deployment smoke tests..."

          API_HOST=$(kubectl get svc -n jobpilot user-service -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          API_BASE="http://${API_HOST}:8001"

          # Test 1: Health
          curl -sf "$API_BASE/health" && echo "[PASS] Health" || echo "[FAIL] Health"

          # Test 2: Register
          REG=$(curl -sf -X POST "$API_BASE/auth/register" \
            -H 'Content-Type: application/json' \
            -d '{"email":"smoke@test.io","password":"SmokeTest1","full_name":"Smoke"}')
          echo "$REG" | grep -q "access_token" && echo "[PASS] Register" || echo "[FAIL] Register"

          TOKEN=$(echo "$REG" | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)
          AUTH="Authorization: Bearer $TOKEN"

          # Test 3: Profile
          curl -sf "$API_BASE/profile" -H "$AUTH" && echo "[PASS] Profile" || echo "[FAIL] Profile"

          echo "Smoke tests complete."

      # ── Notify ───────────────────────────────────────────────
      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL }}
          slack-message: |
            🚀 Deploy to *${{ env.ENV }}* ${{ job.status == 'success' && '✅ succeeded' || '❌ failed' }}
            Tag: `${{ env.IMAGE_TAG }}`
            Canary: 10% → ${{ steps.canary-check.outputs.canary_failed == 'true' && '❌ rolled back' || '✅ full rollout' }}
            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
