name: CI - Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/jobpilot

jobs:
  # ── Lint ─────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        if: matrix.component == 'backend'
        with: { python-version: "3.11" }

      - uses: actions/setup-node@v4
        if: matrix.component == 'frontend'
        with: { node-version: "20", cache: npm, cache-dependency-path: frontend/package-lock.json }

      - name: Python Lint
        if: matrix.component == 'backend'
        run: |
          pip install black isort ruff
          black --check backend/
          isort --check-only backend/
          ruff check backend/

      - name: Bandit Security Scan
        if: matrix.component == 'backend'
        run: |
          pip install bandit
          bandit -r backend/ -ll -f json -o bandit-report.json || true
          echo "Bandit scan complete. See bandit-report.json for details."

      - name: Safety Dependency Check
        if: matrix.component == 'backend'
        run: |
          pip install safety
          safety check --full-report || true
          echo "Safety check complete. Review output for vulnerable dependencies."

      - name: Frontend Lint
        if: matrix.component == 'frontend'
        run: |
          cd frontend
          npm ci
          npx prettier --check "src/**/*.{ts,tsx,css}"
          npx tsc --noEmit

  # ── Test ─────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: jobpilot
          POSTGRES_PASSWORD: jobpilot_secret
          POSTGRES_DB: jobpilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    strategy:
      matrix:
        service:
          - user_service
          - resume_service
          - match_service
          - apply_service
          - interview_service
          - agent_service
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install dependencies
        run: |
          cd backend/services/${{ matrix.service }}
          pip install -r requirements.txt

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://jobpilot:jobpilot_secret@localhost:5432/jobpilot_test
        run: |
          cd backend/services/${{ matrix.service }}
          python -m pytest tests/ -v --tb=short --timeout=60

  # ── Build ────────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - user-service
          - resume-service
          - match-service
          - apply-service
          - interview-service
          - agent-service
          - frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            latest

      - uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: SERVICE_NAME=${{ matrix.service }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
